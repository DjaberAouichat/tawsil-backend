name: Deploy Backend to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

# NOTE: Set the following GitHub repository secrets before running this workflow:
# - AZURE_WEBAPP_NAME       -> the name of your Azure Web App resource
# - AZURE_WEBAPP_PUBLISH_PROFILE -> contents of the publish profile XML downloaded from Azure portal
# NOTE: Also set NODE_ENV=production in Azure App Service -> Configuration -> Application Settings
